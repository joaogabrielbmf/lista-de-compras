name: CLI test

on:
  push: 
    branches: ["main"]

jobs: 
  test-cli:
    runs-on: ubuntu-latest 

    permissions:
      contents: read

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: add to bucket
        run: aws s3 sync . s3://test-ci-bmf --exclude ".git/*"
